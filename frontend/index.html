<!doctype html>
<html lang="en">

<head>
  <script>
    (function () {
      try {
        // Check localStorage for saved theme
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {
        // Fail silently (e.g., if localStorage is disabled)
      }
    })();
  </script>

  <meta charset="utf-8" />
  <link rel="icon" type="image/jpeg" href="/logo/cliberduche_logo.png" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cliberduche</title>

  <!-- Google Fonts: Libre Caslon Display (headings) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
</head>

</body>

</html>
